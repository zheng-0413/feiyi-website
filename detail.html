<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>非遗详情</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Noto Serif SC", "PingFang SC", "Microsoft YaHei", serif;
}
/* 关键修复：html/body占满全屏，背景固定 */
html, body {
  height: 100%;
  min-height: 100vh;
}
body {
  background: url("../img/b.jpg") no-repeat center center fixed;
  background-size: cover;
  position: relative;
}
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(243, 155, 67, 0.4);
  z-index: -1;
}
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, 
    rgba(49, 30, 30, 0.92) 0%, 
    rgba(176, 118, 106, 0.75) 15%, 
    transparent 25%, 
    transparent 75%, 
    rgba(176, 118, 106, 0.75) 85%, 
    rgba(72, 45, 45, 0.92) 100%
  );
  z-index: 0;
}
.container {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  padding: 30px 20px;
  min-height: 100vh;
}

  /* ========== 精美玻璃卡片 + 阴影强化 ========== */
  .detail-card {
    background: rgba(255, 194, 157, 0.28);
    border-radius: 28px;
    padding: 48px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(20px);
  }
  .header {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 2px solid rgba(238, 235, 213, 0.4);
  }
  .header h1 {
    font-size: 40px;
    background: linear-gradient(135deg, #d06711, #ffe4c4);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 12px;
    letter-spacing: 2px;
    font-weight: 700;
  }
  .header .tag {
    display: inline-block;
    background: rgba(236, 171, 75, 0.3);
    color: #b5791a;
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(146, 50, 50, 0.1);
    letter-spacing: 1px;
  }
  .info-section {
    margin-bottom: 36px;
  }
  .info-row {
    display: flex;
    margin-bottom: 20px;
    padding: 16px 0;
    border-bottom: 1px solid rgba(189, 103, 23, 0.763);
  }
  .info-row:last-child {
    border-bottom: none;
  }
  .info-label {
    width: 120px;
    font-weight: 600;
    color: #ffffff;
    font-size: 20px;
    flex-shrink: 0;
  }
  .info-value {
    flex: 1;
    color: #793e03;
    font-size: 18px;
    line-height: 1.7;
  }
  /* ========== 精美内容块 ========== */
  .desc-block {
    background: rgba(228, 168, 122, 0.25);
    padding: 28px;
    border-radius: 20px;
    margin: 24px 0;
    border-left: 5px solid rgba(190, 102, 51, 0.6);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transition: 0.3s;
  }
  .desc-block:hover {
    background: rgba(240, 238, 234, 0.32);
    transform: translateY(-3px);
  }
  .desc-block h4 {
    color: #ad531f;
    margin-bottom: 15px;
    font-size: 23px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .desc-block p {
    color: #faf7f6;
    line-height: 2;
    font-size: 19px;
  }
  .btn-group {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-top: 50px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 16px 40px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    letter-spacing: 1px;
  }
  .btn-primary {
    background: rgba(255, 255, 255, 0.35);
    border: 2px solid rgba(255,255,255,0.4);
    color: #ec801b;
  }
  .btn-primary:hover {
    background: rgba(224, 185, 134, 0.5);
    transform: translateY(-3px);
  }
  .btn-outline {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.4);
    color: #e66f0d;
  }
  .btn-outline:hover {
    background: rgba(246, 191, 141, 0.35);
    transform: translateY(-3px);
  }
</style>
</head>
