<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>AI智能推荐</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Noto Serif SC", "PingFang SC", "Microsoft YaHei", serif;
}
/* 关键修复：html/body占满全屏，背景固定 */
html, body {
  height: 100%;
  min-height: 100vh;
}
body {
  background: url("/img/b.jpg") no-repeat center center fixed;
  background-size: cover;
  position: relative;
}
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(243, 155, 67, 0.4);
  z-index: -1;
}
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, 
    rgba(49, 30, 30, 0.92) 0%, 
    rgba(176, 118, 106, 0.75) 15%, 
    transparent 25%, 
    transparent 75%, 
    rgba(176, 118, 106, 0.75) 85%, 
    rgba(72, 45, 45, 0.92) 100%
  );
  z-index: 0;
}
.container {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  padding: 30px 20px;
  min-height: 100vh;
}
.detail-card {
  background: rgba(255, 255, 255, 0.92);
  border-radius: 28px;
  padding: 48px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(20px);
}

 .header {
  background: linear-gradient(135deg, rgba(234, 130, 20, 0.5), rgba(238, 158, 131, 0.4)); /* 改这里的透明度 */
  color: #ffffff;
  padding: 40px 30px;
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 15px 45px rgba(134, 88, 19, 0.35);
  margin-bottom: 30px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.15);
}
  .header h1 {
    font-size: 32px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .header p {
    font-size: 16px;
    opacity: 0.95;
  }
  .recommend-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 40px;
  }
.recommend-card {
  background: rgba(247, 202, 178, 0.3); /* 改这里的透明度 */
  padding: 20px 24px;
  border-radius: 16px;
  box-shadow: 0 8px 24px rgba(151, 64, 18, 0.25);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.3s;
  border: 1px solid rgba(139, 58, 58, 0.2);
  backdrop-filter: blur(10px);
}
  .recommend-card:hover {
    background: rgba(255, 248, 245, 0.95);
    transform: translateX(6px);
    box-shadow: 0 10px 30px rgba(241, 169, 86, 0.35);
  }
  .recommend-card .icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, #8b583a, #ee5a28);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 24px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(224, 134, 70, 0.3);
  }
  .recommend-card .content h3 {
    font-size: 18px;
    color: #3a3a3a;
    margin-bottom: 4px;
  }
  .recommend-card .content p {
    font-size: 14px;
    color: #666;
  }
.back-btn {
  display: block;
  width: 100%;
  background: linear-gradient(135deg, rgba(248, 135, 54, 0.881), rgba(225, 150, 125, 0.8)); /* 改这里的透明度 */
  color: #fff;
  text-align: center;
  padding: 20px;
  border-radius: 16px;
  font-size: 18px;
  font-weight: 600;
  text-decoration: none;
  box-shadow: 0 10px 30px rgba(241, 124, 51, 0.4);
  transition: all 0.3s;
}
  .back-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 40px rgba(241, 162, 93, 0.5);
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>AI 智能推荐</h1>
    <p>根据您的浏览习惯，为您定制非遗内容</p>
  </div>

  <div class="recommend-list">
    <div class="recommend-card" onclick="location.href='detail.html?id=huimo'">
      <div class="icon">✨</div>
      <div class="content">
        <h3>徽墨制作技艺</h3>
        <p>文房四宝，墨中珍品</p>
      </div>
    </div>
    <div class="recommend-card" onclick="location.href='detail.html?id=duanyan'">
      <div class="icon">✨</div>
      <div class="content">
        <h3>端砚制作技艺</h3>
        <p>四大名砚，发墨细腻</p>
      </div>
    </div>
    <div class="recommend-card" onclick="location.href='detail.html?id=muzhi'">
      <div class="icon">✨</div>
      <div class="content">
        <h3>木版水印技艺</h3>
        <p>传统印刷，笔墨神韵</p>
      </div>
    </div>
    <div class="recommend-card" onclick="location.href='detail.html?id=jianzhi'">
      <div class="icon">✨</div>
      <div class="content">
        <h3>剪纸（北方剪纸）</h3>
        <p>镂空艺术，民间瑰宝</p>
      </div>
    </div>
    <div class="recommend-card" onclick="location.href='detail.html?id=suxiu'">
      <div class="icon">✨</div>
      <div class="content">
        <h3>苏绣</h3>
        <p>四大名绣，精细雅洁</p>
      </div>
    </div>
  </div>

  <a href="index.html" class="back-btn">返回首页</a>
</div>

<script>
</script>
</body>
</html>
