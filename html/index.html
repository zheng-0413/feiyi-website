<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>非遗文化传承平台</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Noto Serif SC", "PingFang SC", "Microsoft YaHei", serif;
}

/* 强制html/body占满全屏，背景固定 */
html, body {
  height: 100% !important;
  min-height: 100vh !important;
  overflow-x: hidden;
}
body {
  background: url("../img/b.jpg") no-repeat center center fixed !important;
  background-size: cover !important;
  background-position: center center !important;
  position: relative;
}
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(243, 155, 67, 0.4);
  z-index: -1;
}
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, 
    rgba(49, 30, 30, 0.92) 0%, 
    rgba(176, 118, 106, 0.75) 15%, 
    transparent 25%, 
    transparent 75%, 
    rgba(176, 118, 106, 0.75) 85%, 
    rgba(72, 45, 45, 0.92) 100%
  );
  z-index: 0;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
  padding: 30px 20px;
  min-height: 100vh; /* 确保容器占满视口 */
}
.main-card {
  background: rgba(255, 255, 255, 0.92);
  border-radius: 28px;
  padding: 48px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(20px);
  /* 关键修复：让卡片撑满容器剩余高度，消除空白 */
  flex: 1;
  min-height: calc(100vh - 60px) !important;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
/* 其余样式保持不变，仅修改背景相关 */
.banner {
  background: linear-gradient(135deg, 
    rgba(255, 240, 220, 0.95), 
    rgba(255, 220, 180, 0.9), 
    rgba(210, 105, 30, 0.85)
  );
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  color: #5a3a3a;
  padding: 70px 30px;
  border-radius: 28px;
  text-align: center;
  box-shadow: 
    0 8px 32px rgba(210, 105, 30, 0.25),
    0 16px 60px rgba(0, 0, 0, 0.2);
  position: relative;
  overflow: hidden;
  margin-bottom: 50px;
}
.banner::before {
  content: "";
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
  animation: shine 12s linear infinite;
  pointer-events: none;
}
@keyframes shine {
  0% { transform: translate(0,0); }
  100% { transform: translate(50%,50%); }
}
.banner h1 {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: 3px;
  position: relative; z-index: 1;
  background: linear-gradient(135deg, #8b3a3a, #d2691e);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.banner p {
  font-size: 19px;
  opacity: 0.9;
  letter-spacing: 1px;
  margin-top: 10px;
  position: relative; z-index: 1;
  color: #5a3a3a;
}

  .search-wrap {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 24px;
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    display: flex; gap: 14px;
    margin-bottom: 50px;
  }
  .search-wrap input {
    flex: 1;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 16px;
    outline: none;
    transition: 0.3s;
  }
  .search-wrap input:focus {
    background: #fff;
    box-shadow: 0 0 0 3px rgba(220,140,80,0.3);
  }
  .search-wrap button {
    background: linear-gradient(135deg, #d2691e, #b85a3a);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(184,90,58,0.35);
  }
  .search-wrap button:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(184,90,58,0.45);
  }

  .section-title {
    font-size: 28px;
    color: #fff;
    margin-bottom: 28px;
    padding-left: 16px;
    border-left: 5px solid #e2650b;
    text-shadow: 0 3px 6px rgba(0,0,0,0.5);
    letter-spacing: 1px;
  }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px,1fr));
    gap: 20px;
    margin-bottom: 60px;
  }
  .category-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 32px 20px;
    border-radius: 20px;
    text-align: center;
    color: #fff;
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    cursor: pointer;
    transition: 0.35s;
    position: relative;
    overflow: hidden;
  }
  .category-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, rgba(210,105,30,0.15), transparent);
    opacity: 0;
    transition: 0.35s;
  }
  .category-card:hover {
    transform: translateY(-6px) scale(1.02);
    background: rgba(255,255,255,0.16);
    box-shadow: 0 18px 45px rgba(0,0,0,0.35);
  }
  .category-card:hover::before {
    opacity: 1;
  }
  .category-card h4 {
    font-size: 19px;
    font-weight: 500;
    position: relative; z-index: 1;
  }

  .culture-list {
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin-bottom: 60px;
  }
  .culture-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 24px 28px;
    border-radius: 20px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: 0.35s;
    color: #fff;
  }
  .culture-card:hover {
    transform: translateX(8px) scale(1.01);
    background: rgba(255,255,255,0.16);
    box-shadow: 0 18px 45px rgba(0,0,0,0.35);
  }
  .culture-card .icon {
    width: 54px; height: 54px;
    border-radius: 16px;
    background: linear-gradient(135deg, #d2691e, #b85a3a);
    display: flex;
    align-items: center; justify-content: center;
    color: #fff; font-size: 26px;
    flex-shrink: 0;
    box-shadow: 0 6px 16px rgba(210,105,30,0.35);
  }
  .culture-card .content h3 {
    font-size: 20px;
    margin-bottom: 6px;
  }
  .culture-card .content p {
    font-size: 15px;
    opacity: 0.85;
  }

  .recommend-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, #d2691e, #b85a3a);
    color: #fff;
    text-align: center;
    padding: 26px;
    border-radius: 20px;
    font-size: 20px;
    font-weight: 600;
    text-decoration: none;
    box-shadow: 0 15px 40px rgba(184,90,58,0.4);
    transition: 0.35s;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .recommend-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 50px rgba(184,90,58,0.5);
  }

  .result-box {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 22px;
    padding: 28px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    margin-bottom: 45px;
    display: none;
    color: #fff;
  }
  .result-box h3 {
    font-size: 22px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<div class="container">
  <div class="banner">
    <h1>非遗文化传承平台</h1>
    <p>传承千年文脉 · 守护非遗匠心</p>
  </div>

  <div class="search-wrap">
    <input id="kw" placeholder="搜索非遗项目，如：宣纸、京剧、针灸..." />
    <button onclick="search()">🔍 搜索</button>
  </div>

  <div id="result" class="result-box">
    <h3>搜索结果</h3>
    <div id="result-content"></div>
  </div>

  <h2 class="section-title">非遗分类</h2>
  <div class="category-grid">
    <div class="category-card" onclick="filterCat('传统技艺')"><h4>传统技艺</h4></div>
    <div class="category-card" onclick="filterCat('传统戏剧')"><h4>传统戏剧</h4></div>
    <div class="category-card" onclick="filterCat('传统医药')"><h4>传统医药</h4></div>
    <div class="category-card" onclick="filterCat('传统美术')"><h4>传统美术</h4></div>
    <div class="category-card" onclick="filterCat('民俗')"><h4>民俗文化</h4></div>
    <div class="category-card" onclick="filterCat('民间文学')"><h4>民间文学</h4></div>
  </div>

  <h2 class="section-title">热门非遗</h2>
  <div class="culture-list">
    <div class="culture-card" onclick="location.href='detail.html?id=xuanzhi'">
      <div class="icon">📜</div>
      <div class="content"><h3>宣纸传统制作技艺</h3><p>千年寿纸，书画载体</p></div>
    </div>
    <div class="culture-card" onclick="location.href='detail.html?id=jingju'">
      <div class="icon">🎭</div>
      <div class="content"><h3>京剧</h3><p>国粹艺术，唱念做打</p></div>
    </div>
    <div class="culture-card" onclick="location.href='detail.html?id=zhenjiu'">
      <div class="icon">💉</div>
      <div class="content"><h3>中医针灸</h3><p>中医瑰宝，经络调理</p></div>
    </div>
    <div class="culture-card" onclick="location.href='detail.html?id=piyingxi'">
      <div class="icon">🎪</div>
      <div class="content"><h3>皮影戏</h3><p>光影艺术，民间戏剧</p></div>
    </div>
  </div>

  <a href="recommend.html" class="recommend-btn">✨ AI 智能为你推荐非遗内容</a>
</div>

<script>
const data = {
  xuanzhi: { name: "宣纸传统制作技艺", desc: "千年寿纸，书画载体" },
  jingju: { name: "京剧", desc: "国粹艺术，唱念做打" },
  zhenjiu: { name: "中医针灸", desc: "中医瑰宝，经络调理" },
  piyingxi: { name: "皮影戏", desc: "光影艺术，民间戏剧" },
  huimo: { name: "徽墨制作技艺", desc: "文房四宝，墨中珍品" },
  duanyan: { name: "端砚制作技艺", desc: "四大名砚，发墨细腻" },
  muzhi: { name: "木版水印技艺", desc: "传统印刷，笔墨神韵" },
  jianzhi: { name: "剪纸", desc: "镂空艺术，民间瑰宝" },
  suxiu: { name: "苏绣", desc: "四大名绣，精细雅洁" }
};

function search() {
  const kw = document.getElementById('kw').value.trim();
  if (!kw) { alert("请输入关键词"); return; }
  const resultBox = document.getElementById('result');
  const resultContent = document.getElementById('result-content');
  resultBox.style.display = 'block';

  const results = [];
  for (const key in data) {
    if (data[key].name.includes(kw)) results.push(key);
  }

  if (results.length === 0) {
    resultContent.innerHTML = '<p style="padding:12px;">未找到相关非遗项目</p>';
  } else {
    resultContent.innerHTML = results.map(key => `
      <div class="culture-card" onclick="location.href='detail.html?id=${key}'">
        <div class="icon">📜</div>
        <div class="content"><h3>${data[key].name}</h3><p>${data[key].desc}</p></div>
      </div>
    `).join('');
  }
}

function filterCat(cat) {
  const resultBox = document.getElementById('result');
  const resultContent = document.getElementById('result-content');
  resultBox.style.display = 'block';
  resultBox.querySelector('h3').textContent = `${cat} 分类非遗`;
  
  const catMap = {
    '传统技艺': ['xuanzhi','huimo','duanyan','muzhi'],
    '传统戏剧': ['jingju','piyingxi'],
    '传统医药': ['zhenjiu'],
    '传统美术': ['jianzhi','suxiu'],
    '民俗': [], '民间文学': []
  };

  const list = catMap[cat] || [];
  if (list.length === 0) {
    resultContent.innerHTML = '<p style="padding:12px;">该分类下暂无内容</p>';
  } else {
    resultContent.innerHTML = list.map(key => `
      <div class="culture-card" onclick="location.href='detail.html?id=${key}'">
        <div class="icon">📜</div>
        <div class="content"><h3>${data[key].name}</h3><p>${data[key].desc}</p></div>
      </div>
    `).join('');
  }
}
</script>
</body>
</html>
